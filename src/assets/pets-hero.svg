<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="petGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
  
  <!-- Fondo circular con gradiente -->
  <circle cx="200" cy="200" r="180" fill="url(#petGradient)" stroke="#0284c7" stroke-width="2" opacity="0.8"/>
  
  <!-- Perro (izquierda) -->
  <g transform="translate(120, 180)" filter="url(#shadow)">
    <!-- Cuerpo del perro -->
    <ellipse cx="0" cy="0" rx="35" ry="25" fill="#8B4513" opacity="0.9"/>
    <!-- Cabeza del perro -->
    <circle cx="-15" cy="-20" r="20" fill="#8B4513" opacity="0.9"/>
    <!-- Orejas del perro -->
    <ellipse cx="-25" cy="-35" rx="8" ry="12" fill="#654321" opacity="0.9"/>
    <ellipse cx="-5" cy="-35" rx="8" ry="12" fill="#654321" opacity="0.9"/>
    <!-- Ojos del perro -->
    <circle cx="-20" cy="-25" r="3" fill="#000000"/>
    <circle cx="-10" cy="-25" r="3" fill="#000000"/>
    <!-- Nariz del perro -->
    <ellipse cx="-15" cy="-18" rx="2" ry="1" fill="#000000"/>
    <!-- Patas del perro -->
    <ellipse cx="-15" cy="20" rx="4" ry="8" fill="#8B4513" opacity="0.9"/>
    <ellipse cx="-5" cy="20" rx="4" ry="8" fill="#8B4513" opacity="0.9"/>
    <ellipse cx="-25" cy="20" rx="4" ry="8" fill="#8B4513" opacity="0.9"/>
    <!-- Cola del perro -->
    <path d="M 15 0 Q 25 -10 30 0 Q 25 10 15 0" fill="#654321" opacity="0.9"/>
  </g>
  
  <!-- Gato (derecha) -->
  <g transform="translate(280, 160)" filter="url(#shadow)">
    <!-- Cuerpo del gato -->
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#FFA500" opacity="0.9"/>
    <!-- Cabeza del gato -->
    <circle cx="0" cy="-15" r="18" fill="#FFA500" opacity="0.9"/>
    <!-- Orejas puntiagudas del gato -->
    <path d="M -10 -30 L -5 -40 L 0 -30 Z" fill="#FF8C00" opacity="0.9"/>
    <path d="M 10 -30 L 5 -40 L 0 -30 Z" fill="#FF8C00" opacity="0.9"/>
    <!-- Ojos del gato -->
    <ellipse cx="-8" cy="-20" rx="2" ry="3" fill="#000000"/>
    <ellipse cx="8" cy="-20" rx="2" ry="3" fill="#000000"/>
    <!-- Pupilas del gato -->
    <ellipse cx="-8" cy="-20" rx="1" ry="1.5" fill="#FFFFFF"/>
    <ellipse cx="8" cy="-20" rx="1" ry="1.5" fill="#FFFFFF"/>
    <!-- Nariz del gato -->
    <ellipse cx="0" cy="-12" rx="1" ry="0.5" fill="#FF69B4"/>
    <!-- Patas del gato -->
    <ellipse cx="-10" cy="15" rx="3" ry="6" fill="#FFA500" opacity="0.9"/>
    <ellipse cx="10" cy="15" rx="3" ry="6" fill="#FFA500" opacity="0.9"/>
    <!-- Cola del gato -->
    <path d="M 20 0 Q 30 -5 35 0 Q 30 5 20 0" fill="#FF8C00" opacity="0.9"/>
  </g>
  
  <!-- Elementos decorativos -->
  <g opacity="0.6">
    <!-- Huellas de patas pequeñas -->
    <circle cx="80" cy="120" r="2" fill="#16a34a"/>
    <circle cx="85" cy="125" r="2" fill="#16a34a"/>
    <circle cx="90" cy="120" r="2" fill="#16a34a"/>
    
    <circle cx="320" cy="100" r="2" fill="#16a34a"/>
    <circle cx="325" cy="105" r="2" fill="#16a34a"/>
    <circle cx="330" cy="100" r="2" fill="#16a34a"/>
    
    <!-- Estrellas pequeñas -->
    <path d="M 150 80 L 152 85 L 157 85 L 153 88 L 155 93 L 150 90 L 145 93 L 147 88 L 143 85 L 148 85 Z" fill="#FFD700" opacity="0.7"/>
    <path d="M 250 70 L 252 75 L 257 75 L 253 78 L 255 83 L 250 80 L 245 83 L 247 78 L 243 75 L 248 75 Z" fill="#FFD700" opacity="0.7"/>
  </g>
  
  <!-- Texto "Mascotas Felices" -->
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0284c7" opacity="0.8">
    Mascotas Felices
  </text>
</svg>
