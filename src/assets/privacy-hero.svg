<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="privacyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
  
  <!-- Fondo circular con gradiente -->
  <circle cx="100" cy="100" r="90" fill="url(#privacyGradient)" stroke="#0284c7" stroke-width="2"/>
  
  <!-- Escudo de seguridad principal -->
  <path d="M 100 30 L 130 45 L 130 80 Q 130 120 100 140 Q 70 120 70 80 L 70 45 Z" 
        fill="#ffffff" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Candado -->
  <rect x="85" y="90" width="30" height="25" rx="3" fill="#16a34a" stroke="#15803d" stroke-width="1"/>
  <rect x="95" y="85" width="10" height="15" rx="5" fill="#16a34a" stroke="#15803d" stroke-width="1"/>
  <circle cx="100" cy="92" r="2" fill="#ffffff"/>
  
  <!-- Estrella de verificación -->
  <path d="M 100 50 L 102 55 L 107 55 L 103 58 L 105 63 L 100 60 L 95 63 L 97 58 L 93 55 L 98 55 Z" 
        fill="#FFD700" opacity="0.8"/>
  
  <!-- Iconos de seguridad -->
  <circle cx="40" cy="60" r="15" fill="rgba(255,255,255,0.9)" stroke="#0284c7" stroke-width="1"/>
  <path d="M 35 60 L 38 63 L 45 56" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <circle cx="160" cy="60" r="15" fill="rgba(255,255,255,0.9)" stroke="#0284c7" stroke-width="1"/>
  <path d="M 155 60 L 158 63 L 165 56" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Líneas de conexión -->
  <path d="M 55 60 Q 80 50 100 50 Q 120 50 145 60" 
        stroke="#0284c7" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Texto "Privacidad" -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" 
        font-weight="bold" fill="#0284c7">Privacidad</text>
  
  <!-- Elementos decorativos -->
  <circle cx="30" cy="30" r="3" fill="#16a34a" opacity="0.6"/>
  <circle cx="170" cy="30" r="3" fill="#16a34a" opacity="0.6"/>
  <circle cx="30" cy="170" r="3" fill="#0284c7" opacity="0.6"/>
  <circle cx="170" cy="170" r="3" fill="#0284c7" opacity="0.6"/>
</svg>
