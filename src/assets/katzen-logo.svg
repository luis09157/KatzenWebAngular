<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo blanco -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Cruz principal -->
  <!-- Barra vertical púrpura -->
  <rect x="70" y="20" width="60" height="160" rx="30" fill="#7B1FA2"/>
  
  <!-- Barra horizontal púrpura -->
  <rect x="20" y="70" width="160" height="60" rx="30" fill="#7B1FA2"/>
  
  <!-- Segmento superior derecho turquesa -->
  <rect x="110" y="20" width="70" height="70" rx="35" fill="#00BCD4"/>
  
  <!-- Segmento inferior izquierdo turquesa -->
  <rect x="20" y="110" width="70" height="70" rx="35" fill="#00BCD4"/>
  
  <!-- Silueta de perro (blanco) en el segmento turquesa superior derecho -->
  <g transform="translate(125, 35)">
    <!-- Cabeza del perro -->
    <ellipse cx="15" cy="15" rx="12" ry="10" fill="white"/>
    <!-- Orejas -->
    <ellipse cx="8" cy="8" rx="4" ry="6" fill="white"/>
    <ellipse cx="22" cy="8" rx="4" ry="6" fill="white"/>
    <!-- Hocico -->
    <ellipse cx="15" cy="20" rx="6" ry="4" fill="white"/>
    <!-- Ojo -->
    <circle cx="12" cy="12" r="2" fill="white"/>
    <!-- Nariz -->
    <ellipse cx="15" cy="18" rx="1" ry="0.5" fill="white"/>
  </g>
  
  <!-- Silueta de gato (blanco) en el segmento púrpura inferior izquierdo -->
  <g transform="translate(35, 125)">
    <!-- Cabeza del gato -->
    <ellipse cx="15" cy="15" rx="12" ry="10" fill="white"/>
    <!-- Orejas puntiagudas -->
    <polygon points="8,8 12,4 16,8" fill="white"/>
    <polygon points="22,8 26,4 30,8" fill="white"/>
    <!-- Hocico -->
    <ellipse cx="15" cy="20" rx="5" ry="3" fill="white"/>
    <!-- Ojos -->
    <ellipse cx="12" cy="12" rx="1.5" ry="2" fill="white"/>
    <ellipse cx="18" cy="12" rx="1.5" ry="2" fill="white"/>
    <!-- Nariz -->
    <ellipse cx="15" cy="16" rx="0.8" ry="0.4" fill="white"/>
    <!-- Bigotes -->
    <line x1="8" y1="15" x2="4" y2="14" stroke="white" stroke-width="0.5"/>
    <line x1="8" y1="16" x2="4" y2="16" stroke="white" stroke-width="0.5"/>
    <line x1="8" y1="17" x2="4" y2="18" stroke="white" stroke-width="0.5"/>
    <line x1="22" y1="15" x2="26" y2="14" stroke="white" stroke-width="0.5"/>
    <line x1="22" y1="16" x2="26" y2="16" stroke="white" stroke-width="0.5"/>
    <line x1="22" y1="17" x2="26" y2="18" stroke="white" stroke-width="0.5"/>
  </g>
</svg>
