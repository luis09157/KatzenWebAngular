<h2 mat-dialog-title>{{ modoVer ? 'Detalle de Usuario' : (data.usuario ? 'Editar Usuario' : 'Agregar Usuario') }}</h2>
<mat-dialog-content>
  <form [formGroup]="usuarioForm">
    <div class="form-row">
      <mat-form-field appearance="fill">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" required />
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" required />
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Rol</mat-label>
        <mat-select formControlName="rol" required>
          <mat-option value="admin">Administrador</mat-option>
          <mat-option value="veterinario">Veterinario</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cerrar()">Cerrar</button>
  <button mat-raised-button color="primary" *ngIf="!modoVer" (click)="guardar()">Guardar</button>
</mat-dialog-actions>
