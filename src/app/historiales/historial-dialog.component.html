<div class="historial-dialog">
  <div class="dialog-header">
    <h2 mat-dialog-title>
      <mat-icon>medical_services</mat-icon>
      {{ isEditMode ? 'Editar' : 'Nuevo' }} Historial Clínico
    </h2>
    <button mat-icon-button (click)="cancelar()" class="close-btn">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="historialForm" (ngSubmit)="guardarHistorial()">
    <div class="dialog-content">
      
      <!-- Diagnóstico -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Diagnóstico *</mat-label>
        <textarea matInput formControlName="diagnostico" 
                  placeholder="Describe el diagnóstico del paciente"
                  rows="3"></textarea>
        <mat-error *ngIf="historialForm.get('diagnostico')?.hasError('required')">
          El diagnóstico es requerido
        </mat-error>
      </mat-form-field>

      <!-- Tratamiento -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Tratamiento *</mat-label>
        <textarea matInput formControlName="tratamiento" 
                  placeholder="Describe el tratamiento aplicado"
                  rows="3"></textarea>
        <mat-error *ngIf="historialForm.get('tratamiento')?.hasError('required')">
          El tratamiento es requerido
        </mat-error>
      </mat-form-field>

      <!-- Medicamentos -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Medicamentos</mat-label>
        <textarea matInput formControlName="medicamentos" 
                  placeholder="Lista de medicamentos recetados"
                  rows="3"></textarea>
      </mat-form-field>

      <!-- Notas -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Notas Adicionales</mat-label>
        <textarea matInput formControlName="notas" 
                  placeholder="Observaciones adicionales"
                  rows="3"></textarea>
      </mat-form-field>

      <!-- ID del Paciente (oculto, se establece automáticamente) -->
      <input type="hidden" formControlName="paciente_id">
    </div>

    <div class="dialog-actions">
      <div class="actions-left">
        <button *ngIf="isEditMode" 
                type="button" 
                mat-stroked-button 
                color="warn" 
                (click)="eliminarHistorial()"
                [disabled]="loading">
          <mat-icon>delete</mat-icon>
          Eliminar
        </button>
      </div>
      
      <div class="actions-right">
        <button type="button" 
                mat-button 
                (click)="cancelar()"
                [disabled]="loading">
          Cancelar
        </button>
        <button type="submit" 
                mat-raised-button 
                color="primary"
                [disabled]="historialForm.invalid || loading">
          <mat-icon *ngIf="!loading">{{ isEditMode ? 'save' : 'add' }}</mat-icon>
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          {{ isEditMode ? 'Actualizar' : 'Crear' }}
        </button>
      </div>
    </div>
  </form>
</div>
