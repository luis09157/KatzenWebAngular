<div class="login-container">
  <div class="logo-container" (click)="irAlInicio()" style="cursor: pointer;">
    <img ngSrc="assets/katzen-logo.jpg" alt="Logo KatzenVet" width="120" height="120" class="logo" />
  </div>
  <h2>Bienvenido a KatzenVet</h2>
  <p class="bienvenida">Por favor inicia sesión para acceder al sistema administrativo.</p>
  <p class="portal-link"><a routerLink="/portal/login">¿Eres cliente? Inicia sesión en el portal del dueño</a></p>
  <form (ngSubmit)="login()">
    <input type="email" [(ngModel)]="email" name="email" placeholder="Correo" required>
    <input type="password" [(ngModel)]="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
  </form>
</div>
