<div class="admin-auth-page">
  <div class="admin-auth-bg" aria-hidden="true"></div>

  <mat-card class="admin-auth-card" appearance="outlined">
    <div class="admin-auth-brand">
      <img ngSrc="assets/katzen-logo.jpg" alt="KatzenVet" width="72" height="72" class="admin-auth-logo">
      <h1>KatzenVet Admin</h1>
      <p>Panel de gestión para personal autorizado</p>
    </div>

    <form class="admin-auth-form" (ngSubmit)="login()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Correo electrónico</mat-label>
        <mat-icon matPrefix>mail_outline</mat-icon>
        <input matInput type="email" [(ngModel)]="email" name="email" autocomplete="username" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Contraseña</mat-label>
        <mat-icon matPrefix>lock_outline</mat-icon>
        <input matInput type="password" [(ngModel)]="password" name="password" autocomplete="current-password" required>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" class="admin-auth-submit">
        <mat-icon>login</mat-icon>
        Iniciar sesión
      </button>
    </form>

    <mat-divider></mat-divider>

    <div class="admin-auth-links">
      <button mat-button type="button" (click)="irAlInicio()">
        <mat-icon>home</mat-icon>
        Ir al inicio
      </button>
      <button mat-button type="button" routerLink="/portal/login">
        <mat-icon>smartphone</mat-icon>
        Portal del dueño
      </button>
    </div>
  </mat-card>
</div>
