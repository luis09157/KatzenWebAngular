<!-- Overlay global de carga: spinner + texto al centro -->
<div *ngIf="(globalLoading.isLoading | async)" class="global-loading-overlay" aria-live="polite" aria-busy="true">
  <div class="global-loading-content">
    <mat-spinner diameter="56" color="primary"></mat-spinner>
    <p class="global-loading-text">Cargando...</p>
  </div>
</div>
<router-outlet></router-outlet>
