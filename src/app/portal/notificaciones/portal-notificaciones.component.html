<div class="portal-page">
  <div class="portal-error" *ngIf="errorMessage" role="alert">
    <mat-icon>error_outline</mat-icon>
    <span>{{ errorMessage }}</span>
  </div>

  <div *ngIf="loading" class="center-loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="portal-empty" *ngIf="!loading && notificaciones.length === 0">
    <div class="portal-empty-icon"><mat-icon>notifications_none</mat-icon></div>
    <h3>No tienes notificaciones</h3>
    <p>Te avisaremos aquí sobre vacunas, citas y novedades de tus mascotas.</p>
  </div>

  <div class="portal-notif-table" *ngIf="!loading && notificaciones.length > 0">
    <button
      type="button"
      class="portal-notif-row"
      [class.unread]="!n.leida"
      *ngFor="let n of notificaciones"
      (click)="abrir(n)">
      <div class="portal-notif-icon">
        <mat-icon>{{ icono(categoria(n.tipo, n.titulo)) }}</mat-icon>
      </div>
      <div>
        <span class="portal-notif-title">{{ n.titulo }}</span>
        <span class="portal-notif-msg">{{ n.mensaje }}</span>
        <span class="portal-notif-time">{{ formatTime(n.fecha) }}</span>
      </div>
      <span class="portal-notif-tag" *ngIf="!n.leida">Nueva</span>
    </button>
  </div>
</div>
