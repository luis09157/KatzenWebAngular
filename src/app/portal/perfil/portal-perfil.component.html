<div class="portal-page">
  <div *ngIf="loading" class="portal-loading"><mat-spinner diameter="36"></mat-spinner></div>

  <ng-container *ngIf="!loading && cliente">
    <div class="profile-hero portal-surface-card">
      <div class="profile-avatar"><mat-icon>person</mat-icon></div>
      <h2 class="portal-page-title">{{ nombreCompleto() }}</h2>
      <div class="profile-badges">
        <span *ngIf="cliente['expediente']" class="portal-chip-count">Exp. {{ cliente['expediente'] }}</span>
        <span class="status-badge" [class.active]="portalActivo()">{{ portalActivo() ? 'Portal activo' : 'Portal pendiente' }}</span>
      </div>
    </div>

    <div class="info-list portal-surface-card">
      <div class="info-item">
        <mat-icon>phone</mat-icon>
        <div><small>Teléfono</small><p>{{ cliente['telefono'] || '—' }}</p></div>
      </div>
      <div class="info-item">
        <mat-icon>mail_outline</mat-icon>
        <div><small>Correo</small><p>{{ cliente['correo'] || email || '—' }}</p></div>
      </div>
      <div class="info-item">
        <mat-icon>home</mat-icon>
        <div><small>Dirección</small><p>{{ direccion() }}</p></div>
      </div>
    </div>

    <div class="profile-actions">
      <button mat-stroked-button color="primary" class="action-btn" (click)="resetPassword()">
        <mat-icon>lock_reset</mat-icon>
        Restablecer contraseña
      </button>
      <button mat-stroked-button color="warn" class="action-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Cerrar sesión
      </button>
    </div>
  </ng-container>
</div>
