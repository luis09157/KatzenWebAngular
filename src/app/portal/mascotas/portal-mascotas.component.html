<div class="portal-page">
  <div *ngIf="loading" class="portal-loading">
    <mat-spinner diameter="36"></mat-spinner>
    <p>Cargando tus mascotas…</p>
  </div>

  <ng-container *ngIf="!loading">
    <div class="welcome-banner portal-surface-card">
      <div>
        <p class="welcome-label">Bienvenido</p>
        <h2 class="portal-page-title">{{ saludo }}</h2>
        <p class="portal-page-subtitle">Selecciona una mascota para ver su expediente</p>
      </div>
      <span class="portal-chip-count">{{ mascotas.length }} activa{{ mascotas.length === 1 ? '' : 's' }}</span>
    </div>

    <div *ngIf="mascotas.length === 0" class="portal-empty-state portal-surface-card">
      <mat-icon>pets</mat-icon>
      <p>No hay mascotas activas en tu expediente</p>
      <small>Comunícate con la clínica si falta alguna mascota registrada</small>
    </div>

    <div class="portal-list-gap">
      <button *ngFor="let m of mascotas" type="button" class="mascota-tile portal-surface-card" (click)="verMascota(m.id)">
        <div class="mascota-tile-icon"><mat-icon>pets</mat-icon></div>
        <div class="mascota-tile-body">
          <strong>{{ m.nombre }}</strong>
          <span>{{ m.especie }}<ng-container *ngIf="m.raza"> · {{ m.raza }}</ng-container></span>
          <small *ngIf="m.edad">Edad: {{ m.edad }}</small>
        </div>
        <mat-icon class="mascota-tile-chevron">chevron_right</mat-icon>
      </button>
    </div>
  </ng-container>
</div>
