<div class="portal-shell">
  <header class="portal-header">
    <div class="portal-container portal-header-inner">
      <a class="portal-brand" routerLink="/portal/mascotas">
        <img src="assets/katzen-logo.png" alt="KatzenVet" class="portal-brand-logo" width="40" height="40">
        <span class="portal-brand-text">
          KatzenVet
          <small>Portal de clientes</small>
        </span>
      </a>

      <nav class="portal-nav" aria-label="Navegación principal">
        <a class="portal-nav-link" routerLink="/portal/mascotas" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">
          <mat-icon>pets</mat-icon>
          Mis mascotas
        </a>
        <a class="portal-nav-link" routerLink="/portal/notificaciones" routerLinkActive="active">
          <mat-icon>notifications</mat-icon>
          Notificaciones
          <span *ngIf="sinLeer > 0" class="portal-nav-badge">{{ sinLeer > 99 ? '99+' : sinLeer }}</span>
        </a>
        <a class="portal-nav-link" routerLink="/portal/perfil" routerLinkActive="active">
          <mat-icon>person</mat-icon>
          Mi cuenta
        </a>
      </nav>

      <div class="portal-header-actions">
        <a mat-button class="portal-link-landing hide-mobile" routerLink="/">Sitio web</a>
        <button *ngIf="userDisplayName" mat-button class="portal-user-btn" [matMenuTriggerFor]="userMenu">
          <span class="portal-user-avatar">{{ userInitial }}</span>
          <span class="hide-mobile">{{ userDisplayName }}</span>
          <mat-icon class="hide-mobile">expand_more</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item routerLink="/portal/perfil">
            <mat-icon>person</mat-icon>
            <span>Mi cuenta</span>
          </button>
          <button mat-menu-item routerLink="/">
            <mat-icon>public</mat-icon>
            <span>Ir al sitio web</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Cerrar sesión</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </header>

  <div class="portal-page-bar">
    <div class="portal-container portal-page-bar-inner">
      <button *ngIf="showBack" mat-button class="portal-back-btn" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
        Volver
      </button>
      <div class="portal-page-bar-text">
        <h1 class="portal-page-title">{{ pageTitle }}</h1>
        <p class="portal-page-subtitle" *ngIf="pageSubtitle">{{ pageSubtitle }}</p>
      </div>
    </div>
  </div>

  <main class="portal-main">
    <div class="portal-container">
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer class="portal-footer">
    <div class="portal-container portal-footer-inner">
      <span>© KatzenVet · Clínica veterinaria</span>
      <a routerLink="/">Volver al sitio web</a>
    </div>
  </footer>
</div>
